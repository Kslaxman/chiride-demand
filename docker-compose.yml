version: "3.9"

services:
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: chicago_fastapi
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./api:/app/api
      - ./models:/app/models
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: chicago_streamlit
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://fastapi:8000
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./api:/app/api
      - ./models:/app/models
      - ./data:/app/data
    depends_on:
      fastapi:
        condition: service_healthy
    restart: unless-stopped