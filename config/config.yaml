      lon: -87.7522
    wrigley_field:
      lat: 41.9484
      lon: -87.6553
    soldier_field:
      lat: 41.8623
      lon: -87.6167
    united_center:
      lat: 41.8807
      lon: -87.6742
    navy_pier:
      lat: 41.8917
